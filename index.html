<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>North Star Azure Group</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #ffffff;
      --surface: #ffffff;
      --surface-soft: #f7f9fc;
      --border: #e6ebf2;
      --text: #132238;
      --muted: #5f7085;
      --heading: #0f1728;
      --azure: #0078d4;
      --azure-soft: #eef6ff;
      --shadow: 0 12px 30px rgba(16, 36, 64, 0.06);
      --radius: 22px;
      --max: 1040px;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }
    html { scroll-behavior: smooth; }

    body {
      font-family: 'Inter', sans-serif;
      background: var(--bg);
      color: var(--text);
      line-height: 1.65;
    }

    a { color: inherit; text-decoration: none; }
    img { max-width: 100%; display: block; }

    .container {
      width: min(var(--max), calc(100% - 2rem));
      margin: 0 auto;
    }

    .topbar {
      background: rgba(255, 255, 255, 0.96);
      border-bottom: 1px solid var(--border);
      position: sticky;
      top: 0;
      z-index: 50;
      backdrop-filter: blur(10px);
    }

    .nav {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 1rem;
      padding: 1rem 0;
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 0.9rem;
    }

    .brand-mark {
      width: 50px;
      height: 50px;
      border-radius: 14px;
      background: linear-gradient(135deg, #28a8ff, #0078d4 70%, #005a9e);
      position: relative;
      overflow: hidden;
      box-shadow: 0 10px 24px rgba(0, 120, 212, 0.18);
      display: grid;
      place-items: center;
    }

    .brand-mark::before,
    .brand-mark::after {
      content: "";
      position: absolute;
      background: rgba(255,255,255,0.2);
      transform: rotate(45deg);
      border-radius: 8px;
    }

    .brand-mark::before {
      width: 36px;
      height: 10px;
      top: 12px;
      left: -3px;
    }

    .brand-mark::after {
      width: 16px;
      height: 44px;
      right: 9px;
      top: 0;
    }

    .brand-mark span {
      position: relative;
      z-index: 1;
      color: #fff;
      font-weight: 800;
      font-size: 1rem;
      letter-spacing: -0.03em;
    }

    .brand-text strong {
      display: block;
      color: var(--heading);
      font-size: 1rem;
      letter-spacing: -0.02em;
    }

    .brand-text span {
      display: block;
      color: var(--muted);
      font-size: 0.84rem;
      font-weight: 600;
      margin-top: 0.08rem;
    }

    .nav-links {
      display: flex;
      align-items: center;
      gap: 1.25rem;
      flex-wrap: wrap;
    }

    .nav-links a {
      color: var(--muted);
      font-weight: 600;
      transition: color 0.2s ease;
    }

    .nav-links a:hover { color: var(--azure); }

    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      padding: 0.92rem 1.28rem;
      border-radius: 999px;
      font-weight: 700;
      transition: transform 0.2s ease, box-shadow 0.2s ease;
    }

    .btn:hover { transform: translateY(-1px); }

    .btn-primary {
      background: var(--azure);
      color: #fff;
      box-shadow: 0 10px 22px rgba(0, 120, 212, 0.16);
    }

    .btn-secondary {
      background: #fff;
      color: var(--heading);
      border: 1px solid var(--border);
    }

    .hero {
      padding: 5rem 0 2.5rem;
    }

    .hero-wrap {
      background: linear-gradient(180deg, #ffffff 0%, #f9fbfe 100%);
      border: 1px solid var(--border);
      border-radius: 32px;
      padding: 3.2rem;
    }

    .eyebrow {
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
      padding: 0.42rem 0.8rem;
      border-radius: 999px;
      background: var(--azure-soft);
      color: var(--azure);
      font-size: 0.82rem;
      font-weight: 700;
      margin-bottom: 1rem;
    }

    h1 {
      color: var(--heading);
      font-size: clamp(2.5rem, 6vw, 4.5rem);
      line-height: 0.98;
      letter-spacing: -0.05em;
      max-width: 720px;
      margin-bottom: 1rem;
    }

    .hero p {
      max-width: 700px;
      color: var(--muted);
      font-size: 1.08rem;
    }

    .hero-actions {
      display: flex;
      gap: 1rem;
      flex-wrap: wrap;
      margin-top: 1.7rem;
    }

    section {
      padding: 1.4rem 0 2.2rem;
    }

    .section-header {
      margin-bottom: 1.25rem;
    }

    .section-header h2 {
      font-size: clamp(1.7rem, 3vw, 2.4rem);
      color: var(--heading);
      letter-spacing: -0.04em;
      margin-bottom: 0.55rem;
    }

    .section-header p {
      max-width: 760px;
      color: var(--muted);
    }

    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 1.65rem;
      box-shadow: var(--shadow);
    }

    .description-card {
      padding: 2rem;
      background: #fff;
    }

    .description-card p + p {
      margin-top: 1rem;
    }

    .news-grid,
    .schedule-grid,
    .registration-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 1.25rem;
    }
